name: CI/CD Pipeline — Booking App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend CI — Install, Migrate, Test
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Newman API)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: booking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma client
        run: |
          cd backend
          npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_test
        run: |
          cd backend
          npx prisma migrate deploy

      - name: Seed test data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_test
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test
        run: |
          cd backend
          # รัน seed script ถ้ามี (สร้าง admin user สำหรับ test)
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const bcrypt = require('bcryptjs');
            const prisma = new PrismaClient();
            async function seed() {
              const hash = await bcrypt.hash('admin123', 10);
              await prisma.user.upsert({
                where: { username: 'admin' },
                update: {},
                create: { username: 'admin', password: hash, role: 'admin' }
              });
              await prisma.room.create({
                data: { name: 'Test Room 101', roomType: 'Standard', capacity: 2, price: 1000 }
              });
              console.log('Seed completed');
            }
            seed().catch(console.error).finally(() => prisma.\$disconnect());
          "

      - name: Start backend server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_test
          JWT_SECRET: ci-test-secret-key
          PORT: 3001
          NODE_ENV: test
        run: |
          cd backend
          npm start &
          # รอให้ server พร้อม
          sleep 5
          curl -f http://localhost:3001/api/rooms || (echo "Server not ready" && exit 1)

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman API Tests
        run: |
          newman run tests/booking-api.postman_collection.json \
            --env-var "baseUrl=http://localhost:3001" \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Upload Newman test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-test-results
          path: newman-results.xml

  # ─────────────────────────────────────────────
  # Job 2: Frontend CI — Install, Build, Lint
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:3001
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ─────────────────────────────────────────────
  # Job 3: Deploy Frontend to Vercel
  # (เฉพาะเมื่อ push ไปที่ main เท่านั้น)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd frontend
          vercel --prod \
            --token $VERCEL_TOKEN \
            --yes

  # ─────────────────────────────────────────────
  # Job 4: Deploy Backend to Render
  # (เฉพาะเมื่อ push ไปที่ main เท่านั้น)
  # ─────────────────────────────────────────────
  deploy-backend-render:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for deployment (90s)
        run: sleep 90

      - name: Health check — Backend on Render
        run: |
          for i in {1..6}; do
            echo "Health check attempt $i/6..."
            if curl -f "${{ secrets.RENDER_BACKEND_URL }}/api/rooms"; then
              echo "✅ Render deployment successful!"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Render health check failed after 6 attempts"
          exit 1


